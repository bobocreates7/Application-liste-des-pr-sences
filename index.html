<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1A73E8" />
    <meta name="description" content="Application de gestion des absences pour les préfets." />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>liste de présence</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash-footer" style="position: fixed; bottom: 20px; width: 100%; text-align: center; color: #666; font-size: 14px; font-family: sans-serif; z-index: 9999; pointer-events: none;">
      Développé par M. Aimé-Bonus
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide the splash footer once the app is mounted
      window.addEventListener('load', () => {
        setTimeout(() => {
          const footer = document.getElementById('splash-footer');
          if (footer) {
            footer.style.opacity = '0';
            footer.style.transition = 'opacity 0.5s ease';
            setTimeout(() => footer.remove(), 500);
          }
        }, 1500); // Give it a little time so it's visible during initial load
      });
    </script>
  </body>
</html>
