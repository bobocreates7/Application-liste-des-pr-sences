<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" fill="#ffffff" />
  
  <g transform="translate(512, 512)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="380" fill="none" stroke="#ff0000" stroke-width="8" />
    <circle cx="0" cy="0" r="280" fill="none" stroke="#ff0000" stroke-width="8" />
    
    <!-- Text along path -->
    <path id="text-path-top" d="M -310,0 A 310,310 0 1,1 310,0" fill="none" />
    <text fill="#ff0000" font-family="Arial, sans-serif" font-weight="bold" font-size="56" letter-spacing="8">
      <textPath href="#text-path-top" startOffset="50%" text-anchor="middle">CENTRE SCOLAIRE MULTIDISCIPLINAIRE</textPath>
    </text>
    
    <!-- CESCOM text at bottom -->
    <path d="M -150, 270 L -200, 380 L 200, 380 L 150, 270 Z" fill="none" stroke="#ff0000" stroke-width="8" />
    <text x="0" y="340" fill="#ff0000" font-family="Arial, sans-serif" font-weight="bold" font-size="64" text-anchor="middle">CESCOM</text>
    
    <!-- Inner drawing: Building/Book/Arrows -->
    <g transform="translate(0, -30)" stroke="#ff0000" stroke-width="6" fill="none">
      <!-- Arrows -->
      <path d="M 0,0 L 0,-140 M 0,-140 L -25,-110 M 0,-140 L 25,-110" />
      <path d="M 0,-70 L -140,-70 L -140,0 M -140,0 L -160,-25 M -140,0 L -120,-25" />
      <path d="M 0,-70 L 140,-70 L 140,0 M 140,0 L 120,-25 M 140,0 L 160,-25" />
      
      <!-- Building Left -->
      <rect x="-190" y="0" width="100" height="100" fill="#ffffff" />
      <path d="M-190,15 h100 M-190,30 h100 M-190,45 h100 M-190,60 h100 M-190,75 h100 M-190,90 h100" stroke-width="2" />
      <path d="M-175,0 v100 M-160,0 v100 M-145,0 v100 M-130,0 v100 M-115,0 v100 M-100,0 v100" stroke-width="2" />
      
      <!-- Building Middle -->
      <rect x="-90" y="30" width="180" height="70" fill="#ffffff" />
      <path d="M-90,45 h180 M-90,60 h180 M-90,75 h180 M-90,90 h180" stroke-width="2" />
      <path d="M-75,30 v70 M-60,30 v70 M-45,30 v70 M-30,30 v70 M-15,30 v70 M0,30 v70 M15,30 v70 M30,30 v70 M45,30 v70 M60,30 v70 M75,30 v70" stroke-width="2" />
      
      <!-- Building Right -->
      <rect x="90" y="0" width="100" height="100" fill="#ffffff" />
      <path d="M90,15 h100 M90,30 h100 M90,45 h100 M90,60 h100 M90,75 h100 M90,90 h100" stroke-width="2" />
      <path d="M105,0 v100 M120,0 v100 M135,0 v100 M150,0 v100 M165,0 v100 M180,0 v100" stroke-width="2" />
      
      <!-- Open Book -->
      <path d="M -70,160 L 0,195 L 70,160 L 70,195 L 0,230 L -70,195 Z" fill="#ffffff" />
      <path d="M 0,195 L 0,125" />
      <path d="M -70,160 L -70,125 Q -35,105 0,125 Q 35,105 70,125 L 70,160" />
    </g>
    
    <!-- Leaves -->
    <path d="M -220,30 C -260,140 -140,240 0,240" fill="none" stroke="#ff0000" stroke-width="8" />
    <path d="M 220,30 C 260,140 140,240 0,240" fill="none" stroke="#ff0000" stroke-width="8" />
    <path d="M -190,70 L -210,50 M -160,120 L -190,95 M -120,165 L -160,150 M -70,200 L -100,190 M -20,225 L -45,215" stroke="#ff0000" stroke-width="6" />
    <path d="M 190,70 L 210,50 M 160,120 L 190,95 M 120,165 L 160,150 M 70,200 L 100,190 M 20,225 L 45,215" stroke="#ff0000" stroke-width="6" />
    
    <!-- Diamonds -->
    <polygon points="-280,270 -260,240 -280,210 -300,240" fill="#ff0000" />
    <polygon points="280,270 260,240 280,210 300,240" fill="#ff0000" />
  </g>
</svg>
